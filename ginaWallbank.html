<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Signature</title>

  <style>
    @font-face {
      font-family: 'PP Neue Montreal';
      font-weight: 400;
      font-style: normal;
      src: url('fonts/pp-neue-montreal/ppneuemontreal-book.otf') format('opentype');
    }

    @font-face {
      font-family: 'Proto Mono';
      font-weight: 400;
      font-style: normal;
      src: url('fonts/PT_Mono/ProtoMono-Light.ttf') format('truetype');
    }

    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div
    style="
      width: 800px;
      height: 294px;
      position: relative;
      background-color: rgba(255, 249, 248, 1);
      font-family: 'PP Neue Montreal', Arial, Helvetica, sans-serif;
      color: #202124;
    "
  >
    <!-- Top horizontal line -->
    <div
      style="
        position: absolute;
        top: 28px;
        left: 0px;
        right: 0px;
        height: 0.9px;
        background-color: rgba(141, 140, 140, 1);
      "
    ></div>

    <!-- Bottom horizontal line -->
    <div
      style="
        position: absolute;
        bottom: 28px;
        left: 0px;
        right: 0px;
        height: 0.9px;
        background-color: rgba(141, 140, 140, 1);
      "
    ></div>

    <!-- Left vertical line -->
    <div
      style="
        position: absolute;
        top: 0px;
        bottom: 0px;
        left: 28px;
        width: 0.9px;
        background-color: rgba(141, 140, 140, 1);
      "
    ></div>

    <!-- Right vertical line -->
    <div
      style="
        position: absolute;
        top: 0px;
        bottom: 0px;
        right: 28px;
        width: 0.9px;
        background-color: rgba(141, 140, 140, 1);
      "
    ></div>

    <!-- Horizontal divider line -->
    <div
      style="
        position: absolute;
        left: 0px;
        right: 28px;
        top: 197px;
        height: 0.9px;
        background-color: rgba(141, 140, 140, 1);
      "
    ></div>

    <!-- Vertical divider line -->
    <div
      style="
        position: absolute;
        top: 197px;
        bottom: 0px;
        left: 400px;
        width: 0.9px;
        background-color: rgba(141, 140, 140, 1);
      "
    ></div>

    <table
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="
        width: 800px;
        height: 294px;
        border-collapse: collapse;
        position: relative;
        z-index: 1;
      "
    >
      <tr>
        <td colspan="2" style="height: 120px; position: relative;">
          <div
            style="
              position: absolute;
              top: 44px;
              left: 60px;
              font-family: 'PP Neue Montreal', Arial, Helvetica, sans-serif;
              font-size: 32px;
              line-height: 37px;
              font-weight: 400;
              letter-spacing: -1px;
              color: rgba(28, 31, 33, 1);
              margin: 0;
            "
          >
            Gina Wallbank
          </div>

          <div
            style="
              position: absolute;
              top: 96px;
              left: 60px;
            "
          >
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="vertical-align: middle; padding-right: 12px;">
                  <img
                    src="images/logoSymbol.png"
                    alt="Logo Symbol"
                    style="
                      width: 16px;
                      height: 16px;
                      display: block;
                      border: 0;
                    "
                  />
                </td>
                <td
                  style="
                    vertical-align: middle;
                    font-family: 'Proto Mono', 'Courier New', Courier, monospace;
                    font-size: 12px;
                    line-height: 16px;
                    letter-spacing: 2px;
                    color: rgba(28, 31, 33, 1);
                    font-weight: 400;
                    white-space: nowrap;
                  "
                >
                  VP BUSINESS DEVELOPMENT & SALES
                </td>
              </tr>
            </table>
          </div>
        </td>
      </tr>

      <tr>
        <td style="width: 50%; padding: 0;"></td>

        <td
          style="
            width: 50%;
            padding: 0 48px 0 0;
            vertical-align: top;
          "
        >
          <table
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="
              margin-top: 10px;
              margin-left: 40px;
            "
          >
            <tr>
              <td style="padding: 0 10px 8px 0; vertical-align: middle;">
                <img
                  src="images/phoneIcon.png"
                  alt="Phone"
                  style="
                    width: 14px;
                    height: 14px;
                    display: block;
                    border: 0;
                  "
                />
              </td>
              <td style="vertical-align: middle; padding-bottom: 8px;">
                <a
                  href="tel:+12395550108"
                  style="
                    font-family: 'PP Neue Montreal', Arial, Helvetica, sans-serif;
                    font-size: 14px;
                    line-height: 20px;
                    color: rgba(28, 31, 33, 1);
                    font-weight: 400;
                    letter-spacing: 2px;
                    text-decoration: none;
                    white-space: nowrap;
                  "
                >
                  (239) 555-0108
                </a>
              </td>
            </tr>

            <tr>
              <td style="padding: 0 10px 0 0; vertical-align: middle;">
                <img
                  src="images/messageIcon.png"
                  alt="Email"
                  style="
                    width: 16px;
                    height: 14px;
                    display: block;
                    border: 0;
                  "
                />
              </td>
              <td style="vertical-align: middle;">
                <a
                  href="mailto:gina.wallbank@deepcyte.bio"
                  style="
                    font-family: 'PP Neue Montreal', Arial, Helvetica, sans-serif;
                    font-size: 14px;
                    line-height: 20px;
                    color: rgba(28, 31, 33, 1);
                    font-weight: 400;
                    letter-spacing: 2px;
                    text-decoration: none;
                    white-space: nowrap;
                  "
                >
                  gina.wallbank@deepcyte.bio
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>

      <tr>
        <td
          style="
            width: 50%;
            text-align: center;
            vertical-align: middle;
            padding-bottom: 26px;
          "
        >
          <a
            href="https://www.deepcyte.bio"
            style="
              font-family: 'Proto Mono', 'Courier New', Courier, monospace;
              font-size: 14px;
              line-height: 20px;
              letter-spacing: 3px;
              color: rgba(28, 31, 33, 1);
              text-decoration: none;
              font-weight: 400;
            "
          >
            WWW.DEEPCYTE.BIO
          </a>
        </td>

        <td
          style="
            width: 50%;
            text-align: center;
            vertical-align: middle;
            padding-bottom: 24px;
          "
        >
          <img
            src="images/logo.png"
            alt="DeepCyte"
            style="
              display: inline-block;
              width: 175px;
              height: 37px;
              border: 0;
            "
          />
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
