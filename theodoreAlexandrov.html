<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Email Signature</title>
</head>
<body style="margin:0; padding:0; background:#ffffff;">
  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse; width:800px; background:#FFF9F8;">
    <tr>
      <td style="width:28px;">&nbsp;</td>
      <td>
        <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse; width:744px;">

          <!-- top border -->
          <tr>
            <td colspan="2" style="height:28px; border-bottom:1px solid #8D8C8C; font-size:0; line-height:0;">&nbsp;</td>
          </tr>

          <!-- name and role -->
          <tr>
            <td colspan="2" style="padding:16px 32px 0 32px; vertical-align:top;">
              <div style="font-family:Arial, Helvetica, sans-serif; font-size:32px; line-height:37px; color:#1C1F21; letter-spacing:-1px;">
                Theodore Alexandrov
              </div>

              <table cellpadding="0" cellspacing="0" border="0" style="margin-top:16px; border-collapse:collapse;">
                <tr>
                  <td style="vertical-align:middle; padding-right:12px;">
                    <img
                      src="https://raw.githubusercontent.com/leticia-003/deepCyte/main/images/logoSymbol.png"
                      alt="Logo Symbol"
                      width="16"
                      height="16"
                      style="display:block; border:0;"
                    />
                  </td>
                  <td style="vertical-align:middle; font-family:'Courier New', Courier, monospace; font-size:14px; line-height:16px; letter-spacing:2px; color:#1C1F21; white-space:nowrap;">
                    CEO &amp; CO-FOUNDER
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- contact block under role -->
          <tr>
            <td colspan="2" style="padding:22px 32px 22px 32px; vertical-align:top;">
              <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse; margin-left:auto;">
                <tr>
                  <td style="padding:0 10px 8px 0; vertical-align:middle;">
                    <img
                      src="https://raw.githubusercontent.com/leticia-003/deepCyte/main/images/phoneIcon.png"
                      alt="Phone"
                      width="14"
                      height="14"
                      style="display:block; border:0;"
                    />
                  </td>
                  <td style="vertical-align:middle; padding-bottom:8px;">
                    <a
                      href="tel:+12395550108"
                      style="font-family:Arial, Helvetica, sans-serif; font-size:14px; line-height:20px; color:#1C1F21; letter-spacing:2px; text-decoration:none; white-space:nowrap;"
                    >
                      (239) 555-0108
                    </a>
                  </td>
                </tr>
                <tr>
                  <td style="padding:0 10px 0 0; vertical-align:middle;">
                    <img
                      src="https://raw.githubusercontent.com/leticia-003/deepCyte/main/images/messageIcon.png"
                      alt="Email"
                      width="16"
                      height="14"
                      style="display:block; border:0;"
                    />
                  </td>
                  <td style="vertical-align:middle;">
                    <a
                      href="mailto:theodore.alexandrov@deepcyte.bio"
                      style="font-family:Arial, Helvetica, sans-serif; font-size:14px; line-height:20px; color:#1C1F21; letter-spacing:2px; text-decoration:none; white-space:nowrap;"
                    >
                      theodore.alexandrov@deepcyte.bio
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- horizontal divider -->
          <tr>
            <td colspan="2" style="border-bottom:1px solid #8D8C8C; font-size:0; line-height:0; height:1px;">&nbsp;</td>
          </tr>

          <!-- bottom content -->
          <tr>
            <td style="width:50%; padding:18px 32px 24px 32px; text-align:center; vertical-align:middle; border-right:1px solid #8D8C8C;">
              <a
                href="https://www.deepcyte.bio"
                style="font-family:'Courier New', Courier, monospace; font-size:14px; line-height:20px; letter-spacing:3px; color:#1C1F21; text-decoration:none;"
              >
                WWW.DEEPCYTE.BIO
              </a>
            </td>

            <td style="width:50%; padding:18px 32px 24px 32px; text-align:center; vertical-align:middle;">
              <img
                src="https://raw.githubusercontent.com/leticia-003/deepCyte/main/images/logo.png"
                alt="DeepCyte"
                width="175"
                height="37"
                style="display:inline-block; border:0;"
              />
            </td>
          </tr>

          <!-- bottom border -->
          <tr>
            <td colspan="2" style="height:28px; border-top:1px solid #8D8C8C; font-size:0; line-height:0;">&nbsp;</td>
          </tr>
        </table>
      </td>
      <td style="width:28px;">&nbsp;</td>
    </tr>
  </table>
</body>
</html>
